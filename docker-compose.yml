services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: bfs-backend:latest
    container_name: bfs-backend
    restart: unless-stopped
    env_file:
      - ./.env
    # Expose backend only to localhost; let existing nginx handle 80/443.
    ports:
      - "127.0.0.1:5005:5000"
