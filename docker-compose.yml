services:
  # Reverse proxy + TLS (Let's Encrypt) for api.birdsfly.org
  traefik:
    image: traefik:v3.6
    container_name: bfs-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "8081:80"
      - "8444:443"
    environment:
      # Cloudflare API Token with DNS edit permission for birdsfly.org zone
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt (DNS challenge via Cloudflare - works without port 80)
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=0"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.email=rahatulislam67777@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.letsencrypt.acme.keytype=RSA2048"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/dev/stdout"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - web

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: bfs-backend:latest
    container_name: bfs-backend
    restart: unless-stopped
    env_file:
      - ./.env
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS redirect
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.routers.backend-http.rule=Host(`api.birdsfly.org`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https"

      - "traefik.http.routers.backend.rule=Host(`api.birdsfly.org`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.service=backend"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  traefik-letsencrypt:
